<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 Happy Birthday My Love ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="hearts"></div>

    <div class="container">

        <h1>🎉 Happy Birthday 🎉</h1>
        <h2>Triash ❤️</h2>

        <div id="giftBox">
            <img src="assets/gift.png" id="giftImage" alt="Gift">
            <h3>🎁 Open Your Surprise</h3>
        </div>

        <div id="surprise" style="display:none;">

            <img id="slideshow" class="photo" src="images/photo1.jpeg" alt="Birthday Photo">

            <div class="message-card">
                <h2 id="typing"></h2>
            </div>

        </div>

    </div>

    <audio id="bgMusic" loop>
        <source src="music/happy-birthday.mp3" type="audio/mpeg">
    </audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
